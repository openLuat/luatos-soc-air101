stages:
  - build

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  LUATOS_REPO_URL: "http://sh.air32.cn:3580/openLuat/LuatOS.git"
  LUATOS_REPO_BRANCH: "master"
  LUATOS_REPO_DIR: "$CI_PROJECT_DIR/../LuatOS"
  DEPLOY_KEY: "deploy/id_ed25519"

build_air101:
  stage: build
  tags:
    - linux
  cache:
    key: "luatos-repo-$CI_COMMIT_REF_SLUG"
    paths:
      - ../LuatOS/
  script:
    - |
      set -euo pipefail
      if [ -d "$LUATOS_REPO_DIR/.git" ]; then
        echo "更新 LuatOS 仓库"
        git -C "$LUATOS_REPO_DIR" remote set-url origin "$LUATOS_REPO_URL"
        git -C "$LUATOS_REPO_DIR" fetch --depth=1 origin "$LUATOS_REPO_BRANCH"
        git -C "$LUATOS_REPO_DIR" reset --hard "origin/$LUATOS_REPO_BRANCH"
      else
        echo "克隆 LuatOS 仓库"
        rm -rf "$LUATOS_REPO_DIR"
        git clone --depth=1 --branch "$LUATOS_REPO_BRANCH" "$LUATOS_REPO_URL" "$LUATOS_REPO_DIR"
      fi
    - gcc -o tools/xt804/wm_tool tools/xt804/wm_tool.c 
    - xmake --version
    - xmake -y
    - |
      if [ -f "$DEPLOY_KEY" ]; then
        chmod 400 "$DEPLOY_KEY"
        python3 deploy.py
      else
        echo "未找到部署密钥 $DEPLOY_KEY, 跳过上传"
      fi
  artifacts:
    paths:
      - ci_build_result.json
    expire_in: 1 year
    when: on_success
  only:
    - branches
    - tags